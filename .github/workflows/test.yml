name: Test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: pacman -Syu --noconfirm bash jq curl git perl
      - name: Run tests
        run: spec/run
